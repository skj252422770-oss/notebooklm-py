        VOTRE ANNÉE EN AUDIO. Le lecteur audio intégré porte le logo NotebookLM.]\"],[[\"https://lh3.googleusercontent.com/notebooklm/AKXwDQF2biwW4RWqZ-Dd6oYxjXwyS0mPwXQDSI2Ew19lgQIB4J6S7CJihf8L6E0ONttrqGckbf0Yt0-wuSt2UCE2etylowa8RpWNJM4VhOOVB8eMpWszah8siG9KRJMNeBrp6X7BBtobcfHv3lWLrqOSKfD8h06K32FXN-cvSwM\\u003dw1376-h768\",1376,768],\"Analyse
        des enjeux juridiques liés aux droits d''auteur et à l''identité vocale dans
        les podcasts générés par IA.\",\"LA FRICTION INÉVITABLE : DROITS D''AUTEUR
        ET IDENTITÉ VOCALE.\\n\\n- Février 2026 - Le procès David Greene.\\n- L’allégation
        : La fonctionnalité de génération de podcasts IA aurait reproduit une voix
        distinctive sans autorisation.\\n- L’enjeu : Les défis juridiques croissants
        autour des données d’entraînement audio et de la protection de l’identité
        biométrique dans l’ère multimodale.\\n\\n[Un marteau de juge en métal repose
        sur une onde sonore grise sur fond bleu foncé.]\"],[[\"https://lh3.googleusercontent.com/notebooklm/AKXwDQG9ycpKED6rex49wc26zjDBVRa8TOV1wMsgfpfLunY5IRe5F7n6Yvl4XkkEbDyO-hC0U3nxF6Ij6tfIgvpYUq6kfz8Q2mdfSZxVaoTpOgMQM1vt5G2FnVhdPvkjFFuoAFsFeSJvn-TxzmpKTc1h0yFUlTAv6NWDs5A3Iw\\u003dw1376-h768\",1376,768],\"Schéma
        illustrant le passage de l''assimilation passive à la consommation active
        d''informations.\",\"LE BASCULEMENT COGNITIF : DE LA LECTURE À LA CONSOMMATION
        ACTIVE.\\n\\nNotebookLM n''est pas un outil d''archivage ou un traitement
        de texte amélioré. C’est la première interface où l’utilisateur ne lit plus
        ses données, il dialogue avec l’architecture même de son information.\\n\\n[L''illustration
        compare deux modes :]\\n- Assimilation Passive : [Un œil regarde un document,
        qui est ensuite stocké dans un cerveau].\\n- Consommation Active : [Un cerveau
        lumineux est au centre d''un réseau complexe d''échanges bidirectionnels avec
        des graphiques, des ondes sonores et l''interface NotebookLM].\"],[[\"https://lh3.googleusercontent.com/notebooklm/AKXwDQEL3uhvGBrDDfe755U3U1BaVi4V_uUtXDnXVuqHa_oABaZhsLVvzDxDHHkljTK-jdY3Y0SzVx2sPEevK5WZAVwHGcwjt1yCt02AuEAzPdUEeofPAiSslzdDiOGUqPLZIJ2trRkgcLAlXJ-hOZjny_xVvHAw7O2jhFP1WA\\u003dw1376-h768\",1376,768],\"Conclusion
        sur le futur interactif de la recherche où l''information devient un moteur
        conversationnel.\",\"L’INFORMATION N’EST PLUS UN LIEU DE STOCKAGE. C’EST UN
        MOTEUR.\\n\\n- Propulsé par Gemini 3 et l’ingestion multimodale.\\n- Adopté
        par les entreprises, les créateurs et les chercheurs.\\n- Le document statique
        est devenu une conversation fluide. Le futur de la recherche est interactif.\\n\\n[Un
        document papier est injecté dans la base d''une pyramide de cristal. Des rayons
        s''en échappent pour alimenter un cercle orbital d''icônes multimédias interactives
        : vidéos, fichiers audio, graphiques et tableaux.]\\n\\nSource : Architecture
        et capacités de Google NotebookLM (2026).\"]],\"https://contribution.usercontent.google.com/download?c\\u003dCgpub3RlYm9va2xtEkYSD2FydGlmYWN0c19tZWRpYRozCiRhNmJiOThiNS0wYzU3LTQ4MmQtYjI4Mi0wODBiNzkzZDY2NDUSCxIHEOXwnYDTCxgB\\u0026filename\\u003dNotebookLM_Redefined_(2).pdf\\u0026opi\\u003d96797242\",\"https://contribution.usercontent.google.com/download?c\\u003dCgpub3RlYm9va2xtEkYSD2FydGlmYWN0c19tZWRpYRozCiQwOWMyZWU1MS00Y2NlLTQxOGQtYmFhNC0wZDAyNDk0YmJhNWYSCxIHEOXwnYDTCxgB\\u0026filename\\u003dNotebookLM_Redefined_(2).pptx\\u0026opi\\u003d96797242\",[[[0,\"Move
